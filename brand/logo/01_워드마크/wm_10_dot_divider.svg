  <style>
    .t { font-family: "Pretendard", sans-serif; font-weight: 800; fill: #0a0a0a; }
    .dot { fill: #c9a84c; }
  </style>
  <text class="t" x="150" y="64" text-anchor="middle" font-size="34" letter-spacing="10">P E N T A</text>
  <!-- Gold dots between letters -->
