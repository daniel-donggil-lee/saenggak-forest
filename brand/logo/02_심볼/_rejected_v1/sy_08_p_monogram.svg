<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="P monogram with pentagon counter">
  <title>P Monogram — Pentagon counter</title>
  <!-- Background rounded square for monogram -->
  <rect x="20" y="20" width="160" height="160" rx="24" fill="#0a0a0a"/>
  <!-- P stem -->
  <rect x="62" y="50" width="18" height="110" fill="#ffffff"/>
  <!-- P bowl — approximated with path; use pentagon shape for the counter -->
  <path d="M 80 50 H 118 A 34 34 0 0 1 118 118 H 80 Z" fill="#ffffff"/>
  <!-- Pentagon counter in gold (instead of circular counter) -->
  <polygon points="99,66 127,85 117,114 88,114 78,85" fill="#c9a84c"/>
</svg>
