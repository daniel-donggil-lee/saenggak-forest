<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Open pentagon">
  <title>B-02 · Open Pentagon — 한 변이 열린 오각형</title>
  <!-- 4 sides drawn, bottom side omitted -->
  <path d="M 60 160 L 32 80 L 100 30 L 168 80 L 140 160"
        fill="none" stroke="#0a0a0a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gold dots marking the opening (invitation to complete) -->
  <circle cx="60"  cy="160" r="4" fill="#c9a84c"/>
  <circle cx="140" cy="160" r="4" fill="#c9a84c"/>
</svg>
