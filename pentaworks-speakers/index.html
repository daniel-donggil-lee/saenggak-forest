  .hero::after {

  .brand-tag {

    font-size: 12px;

    margin-bottom: 28px;
  }
  .hero h1 {

    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 1.05;
    margin-bottom: 18px;
  }
  .hero h1 span { color: var(--gold); }
  .hero-sub {
    font-size: clamp(15px, 1.4vw, 18px);

  }
  .hero-meta {

    padding-top: 28px;

  .hero-meta b {

    margin-bottom: 4px;

  .hero-meta b span { color: var(--gold); }

  /* ── 필터 바 ── */

    gap: 8px;
    flex-wrap: wrap;

  .chip {
    appearance: none;
    border: 1px solid var(--border);

    color: var(--white);
    border-color: var(--black);

<script>
  const speakers = JSON.parse(document.getElementById('speakers-data').textContent);
  const grid = document.getElementById('grid');
  const filters = document.getElementById('filters');

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function renderCard(s) {
    const metaRows = [];
    if (s.career)  metaRows.push(['경력', s.career]);
    if (s.books)   metaRows.push(['저서', s.books]);
    if (s.channel) metaRows.push(['채널', s.channel]);

    const metaHtml = metaRows.map(([k,v]) =>
      `<div class="meta-row"><div class="meta-label">${escapeHtml(k)}</div><div class="meta-val">${escapeHtml(v)}</div></div>`
    ).join('');

    const topicsHtml = (s.topics || [])
      .filter(t => t && t.trim())
      .map(t => `<div class="topic">${escapeHtml(t)}</div>`)
      .join('');

    return `
      <article class="card" data-category="${s.category}">
        <div class="photo">
          <span class="cat-badge">${escapeHtml(s.categoryLabel)}</span>
          <img src="${escapeHtml(s.photo)}" alt="${escapeHtml(s.name)} 프로필 사진" loading="lazy">
        </div>
        <div class="body">
          <h2 class="name">${escapeHtml(s.name)}</h2>
          <div class="affiliation">${escapeHtml(s.affiliation || '')}</div>
          ${metaHtml ? `<div class="meta">${metaHtml}</div>` : ''}
          ${topicsHtml ? `
            <div class="divider"></div>
            <div class="topics-title">강연 주제</div>
            <div class="topics">${topicsHtml}</div>
          ` : ''}
        </div>
      </article>
    `;
  }

  grid.innerHTML = speakers.map(renderCard).join('');

  filters.addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    const f = btn.dataset.filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === btn));
    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('hidden', f !== 'all' && card.dataset.category !== f);
    });
  });
</script>

</body>
</html>
