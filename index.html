  };

  const items = [];

  // 1. 논의 시트 — 생애주기 통합
  const discRows = (allData['논의'] || []).slice(2);
  discRows.forEach((r, idx) => {
    const title = (r[1] || '').trim();
    if (!title) return;
    const status = (r[3] || '').trim() || '아이디어';
    const proj = normalizeDept(r[5]);
    if (currentDept && proj !== currentDept) return;
    if (subprojectFilter && (r[6]||'').trim() !== subprojectFilter) return;
    const meta = STATUS_META[status] || STATUS_META['아이디어'];
    const bodyParts = [r[2], r[8], r[9]].filter(x => x && x.trim());
    items.push({
      src: '논의', status, meta, title,
      body: bodyParts.join(' · '),
      category: r[0] || '',
      assignee: r[4] || '',
      priority: r[7] || '',
      rowIdx: idx + 2,
    });
  });

  // 2. 회의록 시트 — 별도 소스 (생애주기 아님)
  const mtgRows = subprojectFilter ? [] : (allData['회의록'] || []).slice(2);
  mtgRows.forEach((r, idx) => {
    const title = (r[1] || '').trim();
    if (!title || title.startsWith('[아카이브')) return;
    items.push({
      src: '회의록', status: '회의록', meta: STATUS_META['회의록'], title,
      body: (r[3] || '') + (r[5] ? ' · ' + r[5] : ''),
      category: r[0] || '',
      assignee: r[2] || '',
      priority: '',
      rowIdx: idx + 2,
    });
  });

  const FILTERS = ['전체', ...DISCUSSION_STATUSES, '회의록'];
  const counts = { '전체': items.filter(i => i.src === '논의').length };
  DISCUSSION_STATUSES.forEach(s => { counts[s] = items.filter(i => i.status === s).length; });
  counts['회의록'] = items.filter(i => i.src === '회의록').length;

  let filtered;
  if (archiveSourceFilter === '전체') filtered = items.filter(i => i.src === '논의');
  else if (archiveSourceFilter === '회의록') filtered = items.filter(i => i.src === '회의록');
  else filtered = items.filter(i => i.status === archiveSourceFilter);

  const chips = FILTERS.map(s => {
    const active = archiveSourceFilter === s;
    const meta = STATUS_META[s];
    const color = s === '전체' ? '#0a0a0a' : (meta ? meta.color : '#0a0a0a');
    const label = s === '전체' ? s : meta.tag;
    return `<span class="archive-chip ${active?'on':''}" onclick="setArchiveSource('${s}')"
      style="${active?'background:'+color+';color:#fff;border-color:'+color:''}">${label}<b>${counts[s]||0}</b></span>`;
  }).join('');

  const config = SHEET_CONFIG['기록'];
  let html = `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModalFor('논의')">+ 논의 추가</button>
    </div>
    <div class="archive-chips">${chips}</div>
    <div class="archive-list">
  `;

  if (!filtered.length) {
    html += `<div style="padding:40px;text-align:center;color:#999">기록이 없습니다.</div>`;
  } else {
    filtered.forEach(it => {
      const prioTag = it.priority && it.priority !== '보류'
        ? `<span class="priority-tag priority-${it.priority==='긴급'?'urgent':'important'}">${escapeHtml(it.priority)}</span>` : '';
      html += `
        <div class="archive-card" onclick="openEditModal('${it.src}', ${it.rowIdx})">
          <div class="archive-tag" style="background:${it.meta.bg};color:${it.meta.color}">${it.meta.tag}</div>
          <div class="archive-body">
            <div class="archive-title">${escapeHtml(it.title)}${prioTag}</div>
            ${it.body ? `<div class="archive-desc">${escapeHtml(it.body).slice(0, 200)}${it.body.length>200?'…':''}</div>` : ''}
            <div class="archive-meta">
              ${it.category ? `<span>${escapeHtml(it.category)}</span>` : ''}
              ${it.assignee ? `<span>· ${escapeHtml(it.assignee)}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;
  panel.innerHTML = html;
}

// 특정 시트에 새 항목 추가 (현재 탭과 무관)
function openAddModalFor(sheet) {
  currentTab = sheet;
  openAddModal();
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRoadmapPanel(config, rows, allDataRows) {
  // 프로젝트별 집계 (row[7] = 프로젝트)
  const projectStats = {};
  allDataRows.forEach(r => {
    const proj = (r[8] || '').trim() || '미분류';
    if (!projectStats[proj]) projectStats[proj] = { total: 0, done: 0, inProgress: 0, next: null };
    projectStats[proj].total++;
    const status = (r[3] || '').trim();
    if (status === '완료') projectStats[proj].done++;
    else if (status === '진행중') projectStats[proj].inProgress++;
    if (!projectStats[proj].next && status !== '완료' && r[1]) {
      projectStats[proj].next = { name: r[1], date: r[2] || '' };
    }
  });
  const projectNames = Object.keys(projectStats).sort((a, b) => {
    if (a === '캠퍼스 플랫폼') return -1;
    if (b === '캠퍼스 플랫폼') return 1;
    if (a === '미분류') return 1;
    if (b === '미분류') return -1;
    return a.localeCompare(b, 'ko');
  });

  // 필터 적용
  const filteredRows = currentProjectFilter
    ? allDataRows.filter(r => ((r[8] || '').trim() || '미분류') === currentProjectFilter)
    : allDataRows;

  const total = filteredRows.length;
  const done = filteredRows.filter(r => (r[3]||'') === '완료').length;
  const inProgress = filteredRows.filter(r => (r[3]||'') === '진행중').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const filterChip = currentProjectFilter
    ? `<span class="project-filter-chip">${currentProjectFilter} <button onclick="clearProjectFilter()" title="필터 해제">×</button></span>`
    : '';

  let html = `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}${filterChip}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModal()">+ 추가</button>
    </div>
    <div id="feedback-feed" class="feedback-feed"><div class="feedback-loading">💬 최근 피드백 불러오는 중…</div></div>
  `;

  // 프로젝트 드릴다운 카드 (필터 없을 때만 표시)
  if (!currentProjectFilter && projectNames.length > 1) {
    html += `<div class="project-section">
      <div class="project-section-title">프로젝트별 보기 · 카드 클릭 시 해당 프로젝트만 필터</div>
      <div class="project-grid">`;
    projectNames.forEach(proj => {
      const s = projectStats[proj];
      const ppct = s.total > 0 ? Math.round((s.done / s.total) * 100) : 0;
      const nextLabel = s.next ? `다음: ${s.next.name}${s.next.date ? ' · ' + s.next.date : ''}` : '모두 완료';
      html += `<div class="project-card" onclick="setProjectFilter('${proj.replace(/'/g, "\\'")}')">
        <div class="project-card-name">${proj}</div>
        <div class="project-card-meta">
          <div class="progress-bar"><div class="progress-fill progress-fill-blue" style="width:${ppct}%"></div></div>
          <span class="progress-text">${s.done}/${s.total}</span>
        </div>
        <div class="project-card-next">${nextLabel}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `
    <div class="progress-summary">
      <span class="progress-summary-label">${currentProjectFilter ? currentProjectFilter + ' 진행률' : '전체 진행률'}</span>
      <div class="progress-bar"><div class="progress-fill progress-fill-green" style="width:${pct}%"></div></div>
      <span class="progress-text">${done}/${total}</span>
      <span style="font-size:12px;color:#656d76">완료 ${done} · 진행중 ${inProgress} · 예정 ${total - done - inProgress}</span>
    </div>
  `;

  // 부서 안에서는 서브프로젝트별 그룹, 랜딩/전체에서는 Phase별 그룹
  const groupBySp = !!currentDept;
  const activeRows = filteredRows.filter(r => (r[3]||'') !== '완료');
  const completedRows = filteredRows.filter(r => (r[3]||'') === '완료');
  const keyOf = r => groupBySp ? ((r[7]||'').trim() || '(미분류)') : ((r[0]||'').trim() || '(단계 미지정)');
  const groupKeys = [...new Set(activeRows.map(keyOf))];
  groupKeys.forEach(gk => {
    const groupAll = filteredRows.filter(r => keyOf(r) === gk);
    const groupActive = activeRows.filter(r => keyOf(r) === gk);
    const groupDone = groupAll.filter(r => (r[3]||'') === '완료').length;
    const groupPct = groupAll.length > 0 ? Math.round((groupDone / groupAll.length) * 100) : 0;
    let groupTitle;
    if (groupBySp) {
      groupTitle = gk;
    } else {
      const showPhaseLabel = !currentDept || currentDept === '펜타스쿨' || currentDept === '본부';
      const phaseLabel = showPhaseLabel ? (PHASE_NAMES[gk] || '') : '';
      groupTitle = phaseLabel ? `${gk}: ${phaseLabel}` : gk;
    }

    // 부서 뷰에서 그룹 헤더 = 서브프로젝트 → 클릭 시 포커스 뷰로
    const headerClick = groupBySp && gk !== '(미분류)'
      ? `style="cursor:pointer" onclick="enterDeptSubproject('${currentDept}','${gk.replace(/'/g,"\\'")}')" title="${gk} 포커스 뷰 열기"`
      : '';
    const titleSuffix = groupBySp && gk !== '(미분류)' ? ' <span style="color:#C9A84C;font-size:12px">→</span>' : '';
    html += `<div class="roadmap-group">
      <div class="roadmap-group-header" ${headerClick}>
        <span class="roadmap-group-title">${groupTitle}${titleSuffix}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-bar"><div class="progress-fill progress-fill-blue" style="width:${groupPct}%"></div></div>
          <span class="progress-text">${groupDone}/${groupAll.length}</span>
        </div>
      </div>`;

    groupActive.forEach(row => {
      const realIdx = rows.indexOf(row);
      const milestone = row[1] || '';
      const date = row[2] || '';
      const status = row[3] || '예정';
      const person = row[4] || '';
      const pi = getPersonInfo(person);
      const sc = status === '예정' ? 'status-scheduled' : status === '진행중' ? 'status-progress' : status === '완료' ? 'status-done' : 'status-delayed';
      const changeBadge = changeMap[`로드맵-${realIdx}`] === 'new' ? '<span class="badge-new">NEW</span>' : changeMap[`로드맵-${realIdx}`] === 'edited' ? '<span class="badge-edited">수정</span>' : '';

      html += `<div class="roadmap-row" onclick="openEditModal(${realIdx})">
        <span class="roadmap-milestone">${milestone}${changeBadge}</span>
        <span class="roadmap-date">${formatDateWithDay(date)}</span>
        <span class="dot ${pi.dot}" style="width:20px;height:20px;font-size:9px">${pi.label}</span>
        <span class="status-badge ${sc}">${status}</span>
      </div>`;
    });

    html += `</div>`;
  });

  // 완료 마일스톤 접기 섹션
  if (completedRows.length > 0) {
    html += `<div class="archive-toggle" onclick="document.getElementById('roadmap-done-section').classList.toggle('show'); this.querySelector('span').textContent = document.getElementById('roadmap-done-section').classList.contains('show') ? '▼' : '▶'">
      <span>▶</span> 완료 마일스톤 (${completedRows.length})
    </div>`;
    html += `<div class="archive-section" id="roadmap-done-section">`;
    completedRows.forEach(row => {
      const realIdx = rows.indexOf(row);
      const milestone = row[1] || '';
      const date = row[5] || row[2] || '';
      const person = row[4] || '';
      const pi = getPersonInfo(person);
      html += `<div class="roadmap-row" style="opacity:0.55" onclick="openEditModal(${realIdx})">
        <span class="roadmap-milestone">${milestone}</span>
        <span class="roadmap-date">${formatDateWithDay(date)}</span>
        <span class="dot ${pi.dot}" style="width:20px;height:20px;font-size:9px">${pi.label}</span>
        <span class="status-badge status-done">완료</span>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ─── 할일 렌더링 ───
function renderTodoPanel(config, rows, allDataRows) {
  const today = new Date(); today.setHours(0,0,0,0);
  const weekLater = new Date(today); weekLater.setDate(weekLater.getDate() + 7);
  const active = allDataRows.filter(r => (r[4]||'') !== '완료');
  const completed = allDataRows.filter(r => (r[4]||'') === '완료');
  const overdue = active.filter(r => {
    const d = r[3] ? new Date(r[3]) : null;
    return d && d < today;
  });
  const thisWeek = active.filter(r => {
    const d = r[3] ? new Date(r[3]) : null;
    return d && d >= today && d <= weekLater;
  });

  let html = `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModal()">+ 추가</button>
    </div>
    ${renderDeliverables()}
    <div class="todo-summary">
      <span><strong>미완료</strong> ${active.length}건</span>
      <span>이번 주 <strong>${thisWeek.length}</strong>건</span>
      ${overdue.length > 0 ? `<span class="cnt-overdue">지연 ${overdue.length}건</span>` : ''}
      <span>완료 ${completed.length}건</span>
    </div>
  `;

  if (!active.length && !completed.length) {
    html += `<div style="padding:40px;text-align:center;color:#9ca3af">${subprojectFilter ? '「'+escapeHtml(subprojectFilter)+'」 서브프로젝트에 할일이 없습니다.' : '할일이 없습니다.'}</div>`;
    document.getElementById('mainContent').innerHTML = html;
    fetchFeedback();
    return;
  }

  // 마일스톤별 그룹핑 (미완료) — 빈 마일스톤도 "(마일스톤 미지정)"로 묶어 표시
  const milestones = [...new Set(active.map(r => (r[0]||'').trim()))];
  milestones.forEach(ms => {
    const msRows = active.filter(r => (r[0]||'').trim() === ms);
    const label = ms || '(마일스톤 미지정)';
    html += `<div class="todo-group">
      <div class="todo-group-header">${label}</div>`;

    msRows.forEach(row => {
      const realIdx = rows.indexOf(row);
      const title = row[1] || '';
      const person = row[2] || '';
      const due = row[3] || '';
      const status = row[4] || '대기';
      const pi = getPersonInfo(person);
      const dueDate = due ? new Date(due) : null;
      const isOverdue = dueDate && dueDate < today && status !== '완료';
      const isDone = status === '완료';
      const checkClass = isDone ? 'done' : '';
      const checkIcon = isDone ? '✓' : '';
      const changeBadge = changeMap[`할일-${realIdx}`] === 'new' ? '<span class="badge-new">NEW</span>' : changeMap[`할일-${realIdx}`] === 'edited' ? '<span class="badge-edited">수정</span>' : '';

      html += `<div class="todo-row" onclick="openEditModal(${realIdx})">
        <div class="todo-check ${checkClass}" onclick="event.stopPropagation(); toggleTodoStatus(${realIdx})">${checkIcon}</div>
        <span class="todo-title ${isDone ? 'done' : ''}">${title}${changeBadge}</span>
        <span class="dot ${pi.dot}" style="width:18px;height:18px;font-size:8px">${pi.label}</span>
        <span class="todo-due ${isOverdue ? 'overdue' : ''}">${formatDateWithDay(due)}${isOverdue ? ' ⚠' : ''}</span>
      </div>`;
    });

    html += `</div>`;
  });

  // 완료 항목 접기
  if (completed.length > 0) {
    html += `<div class="archive-toggle" onclick="document.getElementById('todo-done-section').classList.toggle('show'); this.querySelector('span').textContent = document.getElementById('todo-done-section').classList.contains('show') ? '▼' : '▶'">
      <span>▶</span> 완료 (${completed.length})
    </div>`;
    html += `<div class="archive-section" id="todo-done-section">`;

    completed.forEach(row => {
      const realIdx = rows.indexOf(row);
      const title = row[1] || '';
      const person = row[2] || '';
      const completedDate = row[5] || '';
      const pi = getPersonInfo(person);

      html += `<div class="todo-row" style="opacity:0.5" onclick="openEditModal(${realIdx})">
        <div class="todo-check done" onclick="event.stopPropagation(); toggleTodoStatus(${realIdx})">✓</div>
        <span class="todo-title done">${title}</span>
        <span class="dot ${pi.dot}" style="width:18px;height:18px;font-size:8px">${pi.label}</span>
        <span class="todo-due">${completedDate || ''}</span>
      </div>`;
    });

    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
  fetchFeedback();
}

// ─── 산출물 링크 렌더링 ───
// 로드맵의 비고 열에서 URL을 감지해 "🔗 산출물" 카드로 노출.
// 완료된 마일스톤은 회색, 진행중/대기는 골드 테두리로 표시.
function renderDeliverables() {
  const roadmapRows = (allData['로드맵'] || []).slice(2);
  const cfg = SHEET_CONFIG['로드맵'];
  const pIdx = cfg.columns.indexOf('프로젝트');
  const items = [];
  roadmapRows.forEach(r => {
    const note = r[6] || '';
    const urlMatch = note.match(/https?:\/\/[^\s]+/);
    if (!urlMatch) return;
    if (currentDept && normalizeDept(r[pIdx]) !== currentDept) return;
    items.push({
      milestone: r[1] || '',
      date: r[2] || '',
      status: r[3] || '대기',
      url: urlMatch[0],
      project: r[pIdx] || ''
    });
  });
  if (!items.length) return '';
  const cards = items.map(it => {
    const done = it.status === '완료';
    const statusColor = done ? '#10b981' : it.status === '진행중' ? '#C9A84C' : '#6b6b6b';
    return `<a class="deliv-card ${done ? 'done' : ''}" href="${escapeHtml(it.url)}" target="_blank" rel="noopener">
      <div class="deliv-top">
        <span class="deliv-status" style="background:${statusColor}">${it.status}</span>
        <span class="deliv-date">${it.date || ''}</span>
      </div>
      <div class="deliv-title">🔗 ${escapeHtml(it.milestone)}</div>
      <div class="deliv-meta">${escapeHtml(it.project)}</div>
    </a>`;
  }).join('');
  return `
    <div class="deliverables-section">
      <div class="deliverables-header">📎 산출물 링크 (${items.length})</div>
      <div class="deliverables-grid">${cards}</div>
    </div>
  `;
}

// ─── 최근 피드백 로드 (DanielFlow Comment 광역) ───
const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyGbLdZSuRfvWC-Yy9xEh9AbIX7NMPWr4EW4cXnP3BPC22AHAtJKI-fixY5W7dk14Kw/exec';
async function fetchFeedback() {
  const el = document.getElementById('feedback-feed');
  if (!el) return;
  try {
    const res = await fetch(FEEDBACK_ENDPOINT);
    const data = await res.json();
    if (!data.ok || !data.comments || !data.comments.length) {
      el.innerHTML = `<div class="feedback-feed-header">💬 최근 피드백</div><div class="feedback-empty">아직 피드백이 없습니다.</div>`;
      return;
    }
    const items = data.comments.slice(0, 5).map(c => {
      const d = c.timestamp ? new Date(c.timestamp) : null;
      const when = d ? d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
      const comment = (c.comment || '').slice(0, 120) + ((c.comment||'').length > 120 ? '…' : '');
      return `
        <div class="feedback-item">
          <span class="fi-proj">${escapeHtml(c.project || '-')}</span>
          <div class="fi-body">
            <div class="fi-head"><b>${escapeHtml(c.author || '익명')}</b><span>${c.rating || ''} · ${when}</span></div>
            <div class="fi-text">${escapeHtml(comment)}</div>
          </div>
        </div>`;
    }).join('');
    el.innerHTML = `<div class="feedback-feed-header">💬 최근 피드백 (최신 ${Math.min(5, data.comments.length)}건)</div><div class="feedback-list">${items}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="feedback-feed-header">💬 최근 피드백</div><div class="feedback-empty">피드백을 불러올 수 없습니다.</div>`;
  }
}

// ─── 할일 상태 토글 ───
async function toggleTodoStatus(rowIdx) {
  const rows = allData['할일'] || [];
  const row = rows[rowIdx] || [];
  const config = SHEET_CONFIG['할일'];
  const values = [...row];
  while (values.length < config.columns.length) values.push('');

  const current = (values[4] || '').trim();
  if (current === '완료') {
    values[4] = '대기';
    values[5] = '';
  } else {
    values[4] = '완료';
    values[5] = new Date().toISOString().slice(0, 10);
  }

  // UI 즉시 반영
  allData['할일'][rowIdx] = values;
  showToast(values[4] === '완료' ? '✓ 완료' : '↩ 복원');
  renderTabs();
  renderPanel();

  // API: 상태(E) + 완료일(F) 2칸만 업데이트
  gasPost({ action: 'update', sheet: '할일', range: `E${rowIdx + 1}:F${rowIdx + 1}`, values: [values[4], values[5]] });
}

let fbCurrentTarget = '';
function openFeedbackModal(target) {
  fbCurrentTarget = target || '';
  document.getElementById('fb_content').value = '';
  const heading = document.getElementById('fb_heading');
  const box = document.getElementById('fb_target_box');
  const lbl = document.getElementById('fb_target_label');
  if (fbCurrentTarget) {
    heading.textContent = '수정 요청';
    lbl.textContent = fbCurrentTarget;
    box.style.display = 'block';
    // 이은경이 주로 쓰는 흐름 — 기본 작성자 이은경
    document.getElementById('fb_author').value = '이은경';
    renderExistingFeedback(fbCurrentTarget);
  } else {
    heading.textContent = '개선 요청';
    box.style.display = 'none';
    document.getElementById('fb_existing').style.display = 'none';
  }
  document.getElementById('feedbackModal').classList.add('show');
}
function closeFeedbackModal() {
  document.getElementById('feedbackModal').classList.remove('show');
  fbCurrentTarget = '';
}
async function renderExistingFeedback(target) {
  const container = document.getElementById('fb_existing');
  container.style.display = 'block';
  container.innerHTML = '<div style="color:#8a8a8e">이전 요청 불러오는 중…</div>';
  try {
    const res = await fetch(FEEDBACK_ENDPOINT);
    const data = await res.json();
    const rows = (data['개선요청'] || []).slice(1);
    const matches = rows.filter(r => (r[4]||'').trim() === target);
    if (!matches.length) {
      container.innerHTML = '<div style="color:#8a8a8e">이 페이지에 대한 이전 요청이 없습니다.</div>';
      return;
    }
    container.innerHTML = matches.map(r => {
      const [author, date, content, status] = r;
      const stBadge = status === '반영완료' ? '#16a34a' : (status === '진행중' ? '#C9A84C' : '#8a8a8e');
      return `<div style="padding:6px 0;border-bottom:1px solid #f0f0f0">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#8a8a8e;margin-bottom:3px">
          <span><b style="color:#1d1d1f">${escapeHtml(author||'')}</b> · ${date||''}</span>
          <span style="color:${stBadge};font-weight:600">${status||'접수'}</span>
        </div>
        <div style="color:#1d1d1f;white-space:pre-wrap">${escapeHtml(content||'')}</div>
      </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = '<div style="color:#dc2626">이전 요청을 불러오지 못했습니다.</div>';
  }
}
async function submitFeedback() {
  const author = document.getElementById('fb_author').value;
  const content = document.getElementById('fb_content').value.trim();
  if (!content) { showToast('내용을 입력해주세요'); return; }
  const today = new Date().toISOString().slice(0, 10);
  await gasPost({ action: 'append', sheet: '개선요청', values: [author, today, content, '접수', fbCurrentTarget] });
  const msg = fbCurrentTarget ? '수정 요청 접수 완료' : '개선 요청 접수 완료';
  closeFeedbackModal();
  showToast(msg);
}
document.getElementById('feedbackModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('feedbackModal')) closeFeedbackModal();
});

function renderNoticePanel() {
  const main = document.querySelector('main');
  const cats = [...new Set(NOTICES.map(n => n.category))];
  let html = `
    <div class="panel-header">
      <div class="panel-desc"><strong>운영 공지 및 가이드.</strong> 자동화 시스템 안내, 회의 운영 방식 등 공동창업자 공유 사항. 카드를 클릭하면 바로 열립니다.</div>
    </div>
  `;
  cats.forEach(cat => {
    const items = NOTICES.filter(n => n.category === cat);
    html += `<div class="section-title">${cat}</div><div class="report-grid">`;
    items.forEach(n => {
      const idx = NOTICES.indexOf(n);
      html += `
        <div class="report-card" onclick="openNotice(${idx})">
          <div class="report-title">${n.title}</div>
          <div class="report-desc">${n.desc}</div>
          <div class="report-meta">
            <span>${n.date}</span>
            <span class="report-cat">${n.category}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  main.innerHTML = html;
}

function openNotice(idx) {
  const n = NOTICES[idx];
  const viewer = document.createElement('div');
  viewer.className = 'report-viewer';
  viewer.id = 'noticeViewer';
  viewer.innerHTML = `
    <div class="report-viewer-bar">
      <span class="rv-title">${n.title}</span>
      <div class="rv-actions">
        <button class="btn-rv" style="background:#C9A84C;color:#1d1d1f;font-weight:600" onclick="openFeedbackModal(${JSON.stringify(n.title).replace(/"/g, '&quot;')})">✏️ 수정 요청</button>
        <button class="btn-rv" onclick="window.open('${n.file}', '_blank')">새 탭에서 열기</button>
        <button class="btn-rv" onclick="closeNotice()">닫기</button>
      </div>
    </div>
    <iframe src="${n.file}"></iframe>
  `;
  document.body.appendChild(viewer);
}

function closeNotice() {
  const v = document.getElementById('noticeViewer');
  if (v) v.remove();
}

function renderReportPanel() {
  const main = document.getElementById('mainContent') || document.querySelector('main');
  let filtered = currentDept ? REPORTS.filter(r => r.dept === currentDept) : REPORTS;
  if (subprojectFilter) filtered = filtered.filter(r => (r.sp||'') === subprojectFilter);
  const cats = [...new Set(filtered.map(r => r.category))];
  const scope = subprojectFilter ? `「${subprojectFilter}」` : (currentDept || '전체');
  let html = `
    <div class="panel-header">
      <div class="panel-desc"><strong>산출물 · 리포트.</strong> ${scope} 관련 리포트. 카드를 클릭하면 바로 열립니다.</div>
    </div>
  `;
  if (filtered.length === 0) {
    html += `<div style="padding:40px;text-align:center;color:#656d76">${scope}에 배정된 리포트가 없습니다.</div>`;
    main.innerHTML = html;
    return;
  }
  cats.forEach(cat => {
    const items = filtered.filter(r => r.category === cat);
    html += `<div class="section-title">${cat}</div><div class="report-grid">`;
    items.forEach((r, idx) => {
      const globalIdx = REPORTS.indexOf(r);
      html += `
        <div class="report-card" onclick="openReport(${globalIdx})">
          <div class="report-title">${r.title}</div>
          <div class="report-desc">${r.desc}</div>
          <div class="report-meta">
            <span>${r.date}</span>
            <span class="report-cat">${r.category}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  main.innerHTML = html;
}

function openReport(idx) {
  const r = REPORTS[idx];
  const viewer = document.createElement('div');
  viewer.className = 'report-viewer';
  viewer.id = 'reportViewer';
  viewer.innerHTML = `
    <div class="report-viewer-bar">
      <span class="rv-title">${r.title}</span>
      <div class="rv-actions">
        <button class="btn-rv" style="background:#C9A84C;color:#1d1d1f;font-weight:600" onclick="openFeedbackModal(${JSON.stringify(r.title).replace(/"/g, '&quot;')})">✏️ 수정 요청</button>
        <button class="btn-rv" onclick="window.open('${r.file}', '_blank')">새 탭에서 열기</button>
        <button class="btn-rv" onclick="closeReport()">닫기</button>
      </div>
    </div>
    <iframe src="${r.file}"></iframe>
  `;
  document.body.appendChild(viewer);
}

function closeReport() {
  const v = document.getElementById('reportViewer');
  if (v) v.remove();
}

loadData();
