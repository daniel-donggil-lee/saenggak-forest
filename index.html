<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENTA 대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f6f8fa; color: #1f2328; min-height: 100vh;
  }
  header {
    background: #fff; border-bottom: 1px solid #d1d9e0;
    padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 22px; font-weight: 600; color: #1f2328; }
  header h1 span { color: #C9A84C; }
  .header-meta { font-size: 13px; color: #656d76; }
  .header-meta a { color: #C9A84C; text-decoration: none; }
  .btn {
    padding: 6px 16px; border-radius: 6px; border: 1px solid #d1d9e0;
    background: #f6f8fa; color: #1f2328; font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { background: #eaeef2; }
  .btn-primary { background: #C9A84C; border-color: #C9A84C; color: #fff; }
  .btn-primary:hover { background: #a8892f; }

  /* Tabs */
  .tabs {
    display: flex; background: #fff; border-bottom: 1px solid #d1d9e0;
    padding: 0 40px; overflow-x: auto;
  }
  .tab {
    padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: #656d76; border-bottom: 2px solid transparent; transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: #1f2328; }
  .tab.active { color: #1f2328; border-bottom-color: #C9A84C; }
  .tab .count {
    background: #e8e8e8; color: #656d76; font-size: 11px;
    padding: 1px 7px; border-radius: 10px; margin-left: 6px;
  }
  .tab.active .count { background: #F5EFD9; color: #C9A84C; }
  .tab-sub { font-size: 11px; color: #656d76; display: block; margin-top: 2px; }
  .tab.active .tab-sub { color: #1f2328; }

  /* Main */
  main { padding: 24px 40px; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    gap: 12px;
  }
  .panel-desc {
    background: #fff; border: 1px solid #d1d9e0; border-radius: 8px;
    padding: 14px 20px; font-size: 14px; color: #656d76; line-height: 1.5; flex: 1;
  }
  .panel-desc strong { color: #1f2328; }

  /* Cards */
  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px;
    margin-top: 12px;
  }
  .card {
    background: #fff; border: 1px solid #d1d9e0; border-radius: 8px;
    padding: 16px 20px; transition: all 0.2s; position: relative; cursor: pointer;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

  /* Ocean Sunset card colors for 의사결정 */
  .card-joint { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .card-joint:hover { box-shadow: 0 2px 8px rgba(30,58,95,0.4); }
  .card-joint .card-content, .card-joint .card-note { color: rgba(255,255,255,0.8); }
  .card-joint .card-note { border-top-color: rgba(255,255,255,0.2); }

  .card-donggil { background: #0e7490; color: #fff; border-color: #0e7490; }
  .card-donggil:hover { box-shadow: 0 2px 8px rgba(14,116,144,0.4); }
  .card-donggil .card-content, .card-donggil .card-note { color: rgba(255,255,255,0.8); }
  .card-donggil .card-note { border-top-color: rgba(255,255,255,0.2); }

  .card-eunkyung { background: #c2410c; color: #fff; border-color: #c2410c; }
  .card-eunkyung:hover { box-shadow: 0 2px 8px rgba(194,65,12,0.4); }
  .card-eunkyung .card-content, .card-eunkyung .card-note { color: rgba(255,255,255,0.8); }
  .card-eunkyung .card-note { border-top-color: rgba(255,255,255,0.2); }

  .card-unknown { background: #78716c; color: #fff; border-color: #78716c; }
  .card-unknown:hover { box-shadow: 0 2px 8px rgba(120,113,108,0.4); }
  .card-unknown .card-content, .card-unknown .card-note { color: rgba(255,255,255,0.8); }
  .card-unknown .card-note { border-top-color: rgba(255,255,255,0.2); }

  /* Person dot colors - used across all tabs */
  .dot {
    width: 22px; height: 22px; border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center; font-size: 10px; font-weight: 700;
    color: #fff; flex-shrink: 0;
  }
  .dot-joint { background: #60a5fa; }
  .dot-donggil { background: #67e8f9; color: #0e7490; }
  .dot-eunkyung { background: #fdba74; color: #9a3412; }
  .dot-unknown { background: #d6d3d1; color: #57534e; }
  .dot-talk { background: #a78bfa; color: #fff; }

  .person-badge {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 10px; font-size: 12px; font-weight: 500;
  }

  .priority-tag {
    display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 4px;
    margin-left: 8px; font-weight: 600; vertical-align: middle;
  }
  .priority-urgent { background: #da3633; color: #fff; }
  .priority-important { background: #bd5d00; color: #fff; }
  .priority-hold { background: #e8e8e8; color: #656d76; }

  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .card-content { font-size: 13px; color: #656d76; line-height: 1.6; }
  .card-note {
    font-size: 12px; color: #656d76; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid #e8e8e8; line-height: 1.5;
  }
  .choices { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .choice {
    font-size: 12px; padding: 4px 12px; border-radius: 6px;
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: inherit;
  }
  .card:not([class*="card-"]) .choice,
  .card-default .choice {
    background: #f6f8fa; border-color: #d1d9e0; color: #1f2328;
  }

  /* Status badges for 조사 */
  .status-badge {
    display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 500;
  }
  .status-wait { background: #fff8c5; color: #9a6700; border: 1px solid #e8d48b; }
  .status-progress { background: #F5EFD9; color: #C9A84C; border: 1px solid #e6d89a; }
  .status-done { background: #dafbe1; color: #1a7f37; border: 1px solid #a7e3b8; }
  .status-scheduled { background: #f0f0f0; color: #656d76; border: 1px solid #d1d9e0; }
  .status-delayed { background: #ffebe9; color: #cf222e; border: 1px solid #f5a3a3; }

  /* Roadmap */
  .roadmap-group { background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .roadmap-group-header { padding: 14px 20px; background: #f6f8fa; border-bottom: 1px solid #d1d9e0; display: flex; justify-content: space-between; align-items: center; }
  .roadmap-group-title { font-size: 14px; font-weight: 600; color: #1f2328; }
  .roadmap-row { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: background 0.15s; }
  .roadmap-row:hover { background: #f6f8fa; }
  .roadmap-row:last-child { border-bottom: none; }
  .roadmap-milestone { flex: 1; font-size: 14px; font-weight: 500; }
  .roadmap-date { font-size: 13px; color: #656d76; min-width: 90px; }
  .progress-bar { height: 6px; background: #e8e8e8; border-radius: 3px; flex: 1; max-width: 120px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .progress-fill-green { background: #1a7f37; }
  .progress-fill-blue { background: #C9A84C; }
  .progress-text { font-size: 12px; color: #656d76; min-width: 40px; text-align: right; }
  .progress-summary { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 16px 20px; background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; }
  .progress-summary .progress-bar { max-width: 200px; height: 8px; }
  .progress-summary-label { font-size: 14px; font-weight: 600; color: #1f2328; }

  /* Project drill-down */
  .project-section { margin-bottom: 20px; }
  .project-section-title { font-size: 12px; font-weight: 600; color: #656d76; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; padding-left: 2px; }
  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .project-card { background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
  .project-card:hover { border-color: #C9A84C; box-shadow: 0 2px 8px rgba(201,168,76,0.1); }
  .project-card.active { border-color: #C9A84C; background: #F5EFD9; }
  .project-card-name { font-size: 14px; font-weight: 600; color: #1f2328; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .project-card-meta { display: flex; align-items: center; gap: 8px; }
  .project-card-meta .progress-bar { flex: 1; max-width: none; height: 6px; }
  .project-card-meta .progress-text { font-size: 11px; min-width: auto; }
  .project-card-next { font-size: 12px; color: #656d76; margin-top: 6px; }
  .project-filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #F5EFD9; border: 1px solid #C9A84C; border-radius: 12px; font-size: 12px; color: #C9A84C; font-weight: 600; margin-left: 10px; }
  .project-filter-chip button { background: none; border: none; color: #C9A84C; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }

  /* Todo */
  .todo-group { background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .todo-group-header { padding: 12px 20px; background: #f6f8fa; border-bottom: 1px solid #d1d9e0; font-size: 13px; font-weight: 600; color: #656d76; display: flex; align-items: center; gap: 8px; }
  .todo-row { padding: 10px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .todo-row:hover { background: #f6f8fa; }
  .todo-row:last-child { border-bottom: none; }
  .todo-check { width: 20px; height: 20px; border: 2px solid #d1d9e0; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; font-size: 12px; }
  .todo-check:hover { border-color: #C9A84C; }
  .todo-check.done { background: #1a7f37; border-color: #1a7f37; color: #fff; }
  .todo-check.in-progress { background: #F5EFD9; border-color: #C9A84C; color: #C9A84C; }
  .todo-title { flex: 1; font-size: 14px; }
  .todo-title.done { text-decoration: line-through; color: #656d76; }
  .todo-due { font-size: 12px; color: #656d76; min-width: 80px; text-align: right; }
  .todo-due.overdue { color: #cf222e; font-weight: 600; }
  .todo-summary { display: flex; gap: 16px; margin-bottom: 16px; padding: 14px 20px; background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; font-size: 13px; color: #656d76; }
  .todo-summary strong { color: #1f2328; }
  .todo-summary .cnt-overdue { color: #cf222e; font-weight: 600; }
  .tab-divider { color: #d1d9e0; font-size: 16px; display: flex; align-items: center; padding: 0 8px; }
  .project-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 600; color: #333;
  }
  .pfilter-bar {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    padding: 10px 0 14px; border-bottom: 1px solid #f0f0f0; margin-bottom: 14px;
  }
  .pfilter-label { font-size: 11px; color: #656d76; font-weight: 600; margin-right: 4px; }
  .pfilter-chip {
    padding: 4px 10px; border-radius: 12px; font-size: 12px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .pfilter-chip:hover { transform: translateY(-1px); }
  .pfilter-chip b { font-weight: 700; margin-left: 3px; opacity: 0.7; }
  .pfilter-chip.clear { background: #fee; color: #c00; }
  .subtabs {
    display: flex; gap: 0; align-items: center;
    padding: 8px 40px 10px; background: #fafbfc;
    border-bottom: 1px solid #e8e8e8; flex-wrap: wrap;
    width: 100%; flex-basis: 100%;
  }
  .subtab {
    padding: 6px 12px; font-size: 13px; color: #656d76; cursor: pointer;
    border-radius: 6px; display: flex; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .subtab:hover { background: #f1f3f5; color: #1f2328; }
  .subtab.active { background: #F5EFD9; color: #0a0a0a; font-weight: 600; }
  .subtab .count {
    background: #e8e8e8; color: #656d76; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .subtab.active .count { background: #C9A84C; color: #fff; }
  .subtab-sub { font-size: 11px; color: #999; margin-left: 4px; }
  .sub-arrow { color: #bbb; font-size: 14px; padding: 0 6px; }
  .tabs { flex-wrap: wrap; }

  /* Feedback button */
  .feedback-btn {
    position: fixed; bottom: 24px; left: 24px; width: 48px; height: 48px;
    border-radius: 50%; border: none; background: #C9A84C; color: #fff;
    font-size: 22px; cursor: pointer; box-shadow: 0 2px 12px rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 90;
    transition: transform 0.15s;
  }
  .feedback-btn:hover { transform: scale(1.1); }
  @media (max-width: 768px) {
    .feedback-btn { width: 40px; height: 40px; font-size: 18px; bottom: 16px; left: 16px; }
  }

  /* Card actions */
  .card-actions {
    position: absolute; top: 10px; right: 10px; display: flex; gap: 4px;
  }
  .card-actions button {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
    color: inherit; width: 26px; height: 26px;
    border-radius: 6px; cursor: pointer; font-size: 12px; display: flex;
    align-items: center; justify-content: center; opacity: 0.7;
  }
  .card-actions button:hover { opacity: 1; background: rgba(255,255,255,0.3); }
  .card:not([class*="card-joint"]):not([class*="card-donggil"]):not([class*="card-eunkyung"]):not([class*="card-unknown"]) .card-actions button {
    background: #f6f8fa; border-color: #d1d9e0; color: #656d76;
  }

  .move-menu {
    display: none; position: absolute; top: 38px; right: 10px; background: #fff;
    border: 1px solid #d1d9e0; border-radius: 8px; z-index: 50; min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden;
  }
  .move-menu.show { display: block; }
  .move-menu div { padding: 8px 16px; font-size: 13px; color: #1f2328; cursor: pointer; }
  .move-menu div:hover { background: #f6f8fa; }

  .section-title {
    font-size: 13px; font-weight: 600; color: #656d76; text-transform: uppercase;
    letter-spacing: 0.5px; margin: 24px 0 4px 0;
  }

  /* Archive */
  .archive-toggle {
    margin-top: 32px; padding: 12px 0; cursor: pointer; font-size: 13px;
    color: #656d76; display: flex; align-items: center; gap: 8px;
    border-top: 1px solid #e8e8e8;
  }
  .archive-toggle:hover { color: #1f2328; }
  .archive-section { display: none; }
  .archive-section.show { display: block; }
  .archive-section .card { opacity: 0.6; }
  .archive-section .card:hover { opacity: 0.9; }
  .archive-label {
    font-size: 12px; color: #656d76; margin: 16px 0 4px 0; font-weight: 500;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border: 1px solid #d1d9e0; border-radius: 12px;
    width: 520px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px;
  }
  .modal h2 { font-size: 18px; color: #1f2328; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px; color: #656d76; margin-bottom: 4px; font-weight: 500;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: #fff; border: 1px solid #d1d9e0; border-radius: 6px;
    padding: 8px 12px; color: #1f2328; font-size: 14px; font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 200px; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none; border-color: #C9A84C; box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .loading { text-align: center; padding: 60px; color: #656d76; font-size: 14px; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #C9A84C; color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 200;
    display: none; animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* NEW / 수정 badges */
  .badge-new, .badge-edited {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px;
    font-weight: 700; margin-left: 6px; vertical-align: middle; letter-spacing: 0.5px;
  }
  .badge-new { background: #da3633; color: #fff; }
  .badge-edited { background: #C9A84C; color: #fff; }

  /* 리포트 탭 */
  .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 12px; }
  .report-card {
    background: #fff; border: 1px solid #d1d9e0; border-radius: 10px;
    padding: 20px 24px; cursor: pointer; transition: all 0.2s;
  }
  .report-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-color: #C9A84C; }
  .report-card .report-title { font-size: 16px; font-weight: 600; color: #1f2328; margin-bottom: 6px; }
  .report-card .report-desc { font-size: 13px; color: #656d76; line-height: 1.5; }
  .report-card .report-meta { font-size: 12px; color: #8b949e; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  .report-card .report-cat { background: #F5EFD9; color: #C9A84C; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .report-viewer {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.6); z-index: 2000; display: flex; flex-direction: column;
  }
  .report-viewer-bar {
    background: #1f2328; color: #fff; padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .report-viewer-bar .rv-title { font-size: 15px; font-weight: 600; }
  .report-viewer-bar .rv-actions { display: flex; gap: 8px; }
  .report-viewer-bar .btn-rv {
    padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3);
    background: transparent; color: #fff; font-size: 13px; cursor: pointer;
  }
  .report-viewer-bar .btn-rv:hover { background: rgba(255,255,255,0.15); }
  .report-viewer iframe { flex: 1; border: none; background: #fff; }

  /* Mobile responsive */
  @media (max-width: 768px) {
    header { padding: 16px 20px; flex-direction: column; gap: 8px; align-items: flex-start; }
    header h1 { font-size: 18px; }
    .tabs { padding: 0 16px; }
    .tab { padding: 10px 14px; font-size: 13px; }
    main { padding: 16px 16px; }
    .panel-header { flex-direction: column; align-items: stretch; }
    .panel-desc { font-size: 13px; }
    .card-grid { grid-template-columns: 1fr; }
    .report-grid { grid-template-columns: 1fr; }
    .modal { width: 95vw; padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1><span>PENTA</span> 대시보드</h1>
  <div class="header-meta" style="display:flex;align-items:center;gap:12px;">
    <div class="search-wrap" style="position:relative;">
      <input id="globalSearch" type="text" placeholder="🔍 전체 검색 (Ctrl+K)"
        style="width:240px;padding:6px 12px;border:1px solid #d1d9e0;border-radius:6px;font-size:13px;font-family:inherit;"
        oninput="runSearch()" onfocus="runSearch()" onblur="setTimeout(()=>closeSearch(),200)">
      <div id="searchResults" style="display:none;position:absolute;top:100%;right:0;margin-top:4px;width:420px;max-height:400px;overflow-y:auto;background:#fff;border:1px solid #d1d9e0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:100;"></div>
    </div>
    <span style="color:#656d76;">이동길 + 이은경</span>
    <a href="https://docs.google.com/spreadsheets/d/1pdW8Xif8ZA75UbkAAbnn02wosNbO5kNnmuJ462E-nqw" target="_blank">Sheets</a>
  </div>

function buildChangeMap(data) {
  const prev = JSON.parse(localStorage.getItem('brainstorm_prev') || '{}');
  const map = {};
  for (const sheet of SHEET_ORDER) {
    const curRows = data[sheet] || [];
    const prevRows = prev[sheet] || [];
    for (let i = 2; i < curRows.length; i++) {
      const row = curRows[i];
      if (!row || !row.some(c => c)) continue;
      const key = `${sheet}-${i}`;
      if (i >= prevRows.length || !prevRows[i] || !prevRows[i].some(c => c)) {
        map[key] = 'new';
      } else if (JSON.stringify(row) !== JSON.stringify(prevRows[i])) {
        map[key] = 'edited';
      }
    }
  }
  return map;
}

  renderTabs();

  renderProjectsBanner();

    const config = SHEET_CONFIG[sheet];
    const pIdx = config.columns.indexOf('프로젝트');
    if (pIdx < 0) return;
    const rows = (allData[sheet] || []).slice(2);
    rows.forEach(r => {
      const title = (r[1]||'').trim();
      if (!title || title.startsWith('[아카이브')) return;
      if (sheet === '할일' && (r[4]||'') === '완료') return;
      const p = (r[pIdx]||'').trim();
      if (!p || p === '공통') return;
      counts[p] = (counts[p]||0) + 1;
    });
  });

  const items = Object.keys(PROJECT_SITES).filter(p => counts[p] || PROJECT_SITES[p].href !== '#');
  if (!items.length) {
    el.innerHTML = '<span style="color:rgba(255,255,255,0.6);font-size:12px">진행 중인 프로젝트 없음</span>';
    return;
  }
  el.innerHTML = items.map(p => {
    const info = PROJECT_SITES[p];
    const cnt = counts[p] || 0;
    const badge = cnt > 0 ? `<span class="pl-count">${cnt}</span>` : '';
    return `<a class="project-link" href="${info.href}" title="${info.label}">
      <span class="pl-name">${p}</span>
      <span class="pl-phase">${info.label}</span>
      ${badge}
    </a>`;
  }).join('');
}

// ─── 이번 주 반드시 ───
function getThisFridayNoon() {
  const now = new Date();
  const dow = now.getDay(); // 0=일 ... 5=금
  const d = new Date(now);
  if (dow === 5 && now.getHours() >= 12) {
    d.setDate(d.getDate() + 7);
  } else {
    const diff = (5 - dow + 7) % 7;
    d.setDate(d.getDate() + diff);
  }
  d.setHours(12, 0, 0, 0);
  return d;
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function renderWeekly() {
  const rows = allData['이번주'] || [];
  const deadline = getThisFridayNoon();
  const deadlineStr = fmtDate(deadline);
  const now = new Date();
  const msLeft = deadline - now;
  const hLeft = Math.max(0, Math.floor(msLeft / (1000*60*60)));
  const dLeft = Math.floor(hLeft / 24);
  const leftTxt = dLeft > 0 ? `${dLeft}일 ${hLeft%24}시간 남음` : `${hLeft}시간 남음`;
  document.getElementById('weeklyDeadline').innerHTML = `마감 <b>${deadlineStr} (금) 12:00</b> · ${leftTxt}`;

  const items = rows.map((r, i) => ({ row: r, idx: i })).filter(o =>
    o.idx >= 2 && o.row && (o.row[1]||'').trim() && (o.row[5]||'') === deadlineStr
  );
  const render = (who, listId, cntId) => {
    const mine = items.filter(o => (o.row[0]||'') === who);
    document.getElementById(cntId).textContent = `${mine.filter(o => (o.row[3]||'') === '완료').length}/${mine.length}`;
    const el = document.getElementById(listId);
    if (mine.length === 0) { el.innerHTML = '<div class="weekly-empty">항목 없음</div>'; return; }
    el.innerHTML = mine.map(o => {
      const done = (o.row[3]||'') === '완료';
      const author = (o.row[2]||'').trim();
      const authorTag = author && author !== who ? `<span class="meta">← ${author}</span>` : '';
      return `<div class="weekly-item ${done?'done':''}">
        <input type="checkbox" ${done?'checked':''} onchange="toggleWeekly(${o.idx}, this.checked)">
        <span class="txt">${escapeHtml(o.row[1])}${authorTag}</span>
        <button class="del" onclick="deleteWeekly(${o.idx})" title="삭제">×</button>
      </div>`;
    }).join('');
  };
  render('이은경', 'eList', 'eCnt');
  render('이동길', 'dList', 'dCnt');
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
async function addWeekly(who) {
  const inputId = who === '이은경' ? 'eInput' : 'dInput';
  const authorId = who === '이은경' ? 'eAuthor' : 'dAuthor';
  const input = document.getElementById(inputId);
  const text = input.value.trim();
  if (!text) return;
  const author = document.getElementById(authorId).value;
  const deadline = fmtDate(getThisFridayNoon());
  const today = fmtDate(new Date());
  try {
    await gasPost({ action: 'append', sheet: '이번주', values: [who, text, author, '대기', today, deadline] });
    input.value = '';
    showToast('추가 완료');
    setTimeout(() => loadData(), 800);
  } catch (e) { showToast('추가 실패'); }
}
async function toggleWeekly(rowIdx, checked) {
  const row = (allData['이번주'] || [])[rowIdx] || [];
  const values = [...row];
  while (values.length < 6) values.push('');
  values[3] = checked ? '완료' : '대기';
  try {
    await gasPost({ action: 'update', sheet: '이번주', range: `A${rowIdx+1}:F${rowIdx+1}`, values });
    setTimeout(() => loadData(), 600);
  } catch (e) { showToast('업데이트 실패'); }
}
async function deleteWeekly(rowIdx) {
  try {
    await gasPost({ action: 'clear', sheet: '이번주', range: `A${rowIdx+1}:F${rowIdx+1}` });
    setTimeout(() => loadData(), 600);
  } catch (e) { showToast('삭제 실패'); }
}

// ─── 글로벌 검색 ───
const SEARCH_LABELS = {
  '로드맵': '🗺️', '할일': '✅', '회의록': '📝', '아이디어': '💡',
  '조사': '🔬', '의사결정': '⚖️', '합의사항': '🤝', '공지사항': '📢',
  '이번주': '⚡', '마케팅': '📸'
};
function runSearch() {
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if (!q) { box.style.display = 'none'; return; }
  const hits = [];
  Object.keys(allData || {}).forEach(sheet => {
    const rows = allData[sheet] || [];
    rows.forEach((row, idx) => {
      if (idx < 2 || !row) return;
      const joined = row.join(' | ').toLowerCase();
      if (joined.includes(q)) {
        const title = (row[1] || row[0] || '').trim();
        const snippet = row.filter(c => c).join(' · ').slice(0, 100);
        hits.push({ sheet, idx, title, snippet });
      }
    });
  });
  // 리포트 검색
  (REPORTS || []).forEach(r => {
    if ((r.title + ' ' + r.desc).toLowerCase().includes(q)) {
      hits.push({ sheet: '리포트', file: r.file, title: r.title, snippet: r.desc });
    }
  });
  if (hits.length === 0) {
    box.innerHTML = '<div style="padding:14px;color:#9ca3af;font-size:13px;">검색 결과 없음</div>';
  } else {
    box.innerHTML = hits.slice(0, 30).map(h => {
      const icon = SEARCH_LABELS[h.sheet] || '📄';
      const action = h.file
        ? `onclick="window.open('${h.file}','_blank')"`
        : `onclick="jumpToResult('${h.sheet}', ${h.idx})"`;
      return `<div ${action} style="padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:13px;" onmouseover="this.style.background='#f6f8fa'" onmouseout="this.style.background='#fff'">
        <div style="color:#C9A84C;font-size:11px;font-weight:700;margin-bottom:2px;">${icon} ${h.sheet}</div>
        <div style="color:#1f2328;font-weight:600;">${escapeHtml(h.title)}</div>
        <div style="color:#656d76;font-size:11px;margin-top:2px;">${escapeHtml(h.snippet)}</div>
      </div>`;
    }).join('');
  }
  box.style.display = 'block';
}
function closeSearch() {
  document.getElementById('searchResults').style.display = 'none';
}
function jumpToResult(sheet, idx) {
  closeSearch();
  document.getElementById('globalSearch').value = '';
  if (sheet === '이번주') {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  if (SHEET_ORDER.includes(sheet)) {
    switchTab(sheet);
    setTimeout(() => {
      const cards = document.querySelectorAll('[data-row-idx]');
      cards.forEach(c => { if (parseInt(c.dataset.rowIdx) === idx) c.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
    }, 300);
  }
}
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('globalSearch').focus();
  }
});

function getPersonInfo(name) {
  const n = (name || '').trim();
  return PERSON_COLORS[n] || { dot: 'dot-unknown', card: '', label: n.charAt(0) || '?' };
}

function personBadgeHtml(name) {
  const p = getPersonInfo(name);
  return `<div class="person-badge"><span class="dot ${p.dot}">${p.label}</span> ${name}</div>`;
}

function tabCount(name) {
  if (name === '마케팅') return CONTENT_COUNT;
  if (name === '리포트') return REPORTS.length;
  if (name === '공지사항') return NOTICES.length;
  const rows = allData[name] || [];
  const dataRows = rows.filter((r, idx) => idx >= 2 && r.some(c => c));
  if (name === '할일') return dataRows.filter(r => (r[1]||'').trim() && (r[4]||'') !== '완료').length;
  if (name === '회의록') return dataRows.filter(r => (r[0]||'').trim()).length;
  if (name === '로드맵') return dataRows.filter(r => (r[1]||'').trim()).length;
  return dataRows.filter(r => {
    const title = (r[1]||'').trim();
    if (!title) return false;
    if (title.startsWith('[아카이브') || title.startsWith('역할:') || title.startsWith('역할 :')) return false;
    const lastCol = r[r.length - 1] || '';
    if (lastCol.startsWith('[→')) return false;
    return true;
  }).length;
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  const currentPrimary = findPrimary(currentTab);

  // 1차 탭
  const primaryHtml = TAB_GROUPS.map(g => {
    const active = g.name === currentPrimary ? 'active' : '';
    const cnt = g.children.reduce((sum, c) => sum + tabCount(c), 0);
    return `<div class="tab ${active}" onclick="switchPrimary('${g.name}')">
      ${g.name}<span class="count">${cnt}</span>
    </div>`;
  }).join('');

  // 2차 탭 (그룹이 2개 이상 children을 가질 때만)
  const currentGroup = TAB_GROUPS.find(g => g.name === currentPrimary);
  let secondaryHtml = '';
  if (currentGroup && currentGroup.children.length > 1) {
    const arrow = '<span class="sub-arrow">&rarr;</span>';
    secondaryHtml = `<div class="subtabs">` + currentGroup.children.map((name, i) => {
      if (name === '마케팅') {
        return `${i > 0 ? arrow : ''}<div class="subtab" onclick="window.location.href='marketing.html'">📸 마케팅<span class="count">${CONTENT_COUNT}</span></div>`;
      }
      const config = SHEET_CONFIG[name];
      const active = name === currentTab ? 'active' : '';
      const cnt = tabCount(name);
      const sub = config && config.sub ? `<span class="subtab-sub">${config.sub}</span>` : '';
      const isFlow = currentPrimary === '브레인스토밍' && i > 0;
      return `${isFlow ? arrow : ''}<div class="subtab ${active}" onclick="switchTab('${name}')">
        ${name}<span class="count">${cnt}</span>${sub}
      </div>`;
    }).join('') + `</div>`;
  }

  bar.innerHTML = primaryHtml + secondaryHtml;
}

function renderProjectFilterBar(rows, colIdx) {
  const counts = {};
  rows.forEach(r => {
    const title = (r[1]||'').trim();
    if (!title || title.startsWith('[아카이브')) return;
    const p = (r[colIdx]||'').trim();
    if (!p) return;
    counts[p] = (counts[p]||0) + 1;
  });
  const chips = PROJECTS.filter(p => counts[p]).map(p => {
    const active = projectFilter === p ? 'active' : '';
    const bg = PROJECT_COLORS[p] || '#f0f0f0';
    return `<span class="pfilter-chip ${active}" style="background:${active?'#0a0a0a':bg};color:${active?'#fff':'#333'}" onclick="setProjectFilter('${p}')">${p} <b>${counts[p]}</b></span>`;
  }).join('');
  const clearBtn = projectFilter ? `<span class="pfilter-chip clear" onclick="setProjectFilter('')">✕ 해제</span>` : '';
  if (!chips) return '';
  return `<div class="pfilter-bar"><span class="pfilter-label">프로젝트:</span>${chips}${clearBtn}</div>`;
}

function setProjectFilter(p) {
  projectFilter = projectFilter === p ? '' : p;
  renderPanel();
}

function switchPrimary(groupName) {
  const g = TAB_GROUPS.find(g => g.name === groupName);
  if (!g) return;
  // 이미 현재 그룹이면 무시, 아니면 첫 children으로 전환
  if (findPrimary(currentTab) === groupName) return;
  switchTab(g.children[0]);
}

function switchTab(name) {
  currentTab = name;
  renderTabs();
  renderPanel();
}

function renderPanel() {
  const config = SHEET_CONFIG[currentTab];
  const rows = allData[currentTab] || [];
  const allDataRows = rows.slice(2).filter(r => r.some(c => c));

  // 로드맵 전용 렌더링
  if (currentTab === '로드맵') {
    return renderRoadmapPanel(config, rows, allDataRows);
  }
  // 회의록 전용 렌더링
  if (currentTab === '회의록') {
    return renderMeetingPanel(config, rows, allDataRows);
  }
  // 할일 전용 렌더링
  if (currentTab === '할일') {
    return renderTodoPanel(config, rows, allDataRows);
  }
  // 공지사항 전용 렌더링
  if (currentTab === '공지사항') {
    return renderNoticePanel();
  }
  // 리포트 전용 렌더링
  if (currentTab === '리포트') {
    return renderReportPanel();
  }

  const projectColIdx = config.columns ? config.columns.indexOf('프로젝트') : -1;
  const dataRows = allDataRows.filter(r => {
    const title = (r[1]||'').trim();
    if (!title || title.startsWith('[아카이브')) return false;
    const lastCol = r[r.length - 1] || '';
    if (lastCol.startsWith('[→')) return false;
    if (projectFilter && projectColIdx >= 0) {
      const p = (r[projectColIdx]||'').trim();
      if (p !== projectFilter) return false;
    }
    return true;
  });
  const archivedRows = allDataRows.filter(r => (r[1]||'').startsWith('[아카이브'));

  const projectBar = projectColIdx >= 0 ? renderProjectFilterBar(allDataRows, projectColIdx) : '';

  let html = projectBar + `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModal()">+ 추가</button>
    </div>
  `;

  // 카테고리별 그룹핑 (모든 탭 공통)
  const usedCats = [...new Set(dataRows.map(r => (r[0]||'').trim()).filter(c => c))];
  const orderedCats = CATEGORIES.filter(c => usedCats.includes(c));
  const uncategorized = dataRows.filter(r => !(r[0]||'').trim());

  orderedCats.forEach(cat => {
    const catRows = dataRows.filter(r => (r[0]||'').trim() === cat);
    if (catRows.length === 0) return;
    html += `<div class="section-title">${cat}</div><div class="card-grid">`;
    catRows.forEach(row => renderCard(row, rows.indexOf(row)));
    html += `</div>`;
  });

  if (uncategorized.length > 0) {
    uncategorized.forEach(row => {
      const title = (row[1]||'').trim();
      if (title.startsWith('역할:') || title.startsWith('역할 :')) {
        html += `<div class="section-title">${title}</div>`;
      }
    });
  }

  // Archive section
  if (archivedRows.length > 0) {
    html += `<div class="archive-toggle" onclick="document.getElementById('archive-section').classList.toggle('show'); this.querySelector('span').textContent = document.getElementById('archive-section').classList.contains('show') ? '▼' : '▶'">
      <span>▶</span> 아카이브 (${archivedRows.length})
    </div>`;
    html += `<div class="archive-section" id="archive-section">`;

    const fromResearch = archivedRows.filter(r => (r[1]||'').includes('[아카이브:조사]'));
    const fromAgreed = archivedRows.filter(r => (r[1]||'').includes('[아카이브:합의]'));
    const fromDecided = archivedRows.filter(r => (r[1]||'').includes('[아카이브:결정확정]'));
    const fromOther = archivedRows.filter(r => !(r[1]||'').includes('[아카이브:조사]') && !(r[1]||'').includes('[아카이브:합의]') && !(r[1]||'').includes('[아카이브:결정확정]'));

    if (fromResearch.length > 0) {
      html += `<div class="archive-label">조사에서 옮김 (${fromResearch.length})</div><div class="card-grid">`;
      fromResearch.forEach(row => {
        const ri = rows.indexOf(row);
        const cleanRow = [...row];
        cleanRow[1] = (cleanRow[1]||'').replace('[아카이브:조사] ', '').replace('[아카이브] ', '');
        renderCard(cleanRow, ri >= 0 ? ri : -1);
      });
      html += `</div>`;
    }
    if (fromAgreed.length > 0) {
      html += `<div class="archive-label">합의사항에서 옮김 (${fromAgreed.length})</div><div class="card-grid">`;
      fromAgreed.forEach(row => {
        const ri = rows.indexOf(row);
        const cleanRow = [...row];
        cleanRow[1] = (cleanRow[1]||'').replace('[아카이브:합의] ', '').replace('[아카이브] ', '');
        renderCard(cleanRow, ri >= 0 ? ri : -1);
      });
      html += `</div>`;
    }
    if (fromDecided.length > 0) {
      html += `<div class="archive-label">결정 확정 (${fromDecided.length})</div><div class="card-grid">`;
      fromDecided.forEach(row => {
        const ri = rows.indexOf(row);
        const cleanRow = [...row];
        cleanRow[1] = (cleanRow[1]||'').replace('[아카이브:결정확정] ', '').replace('[아카이브] ', '');
        renderCard(cleanRow, ri >= 0 ? ri : -1);
      });
      html += `</div>`;
    }
    if (fromOther.length > 0) {
      html += `<div class="archive-label">아카이브 (${fromOther.length})</div><div class="card-grid">`;
      fromOther.forEach(row => {
        const ri = rows.indexOf(row);
        const cleanRow = [...row];
        cleanRow[1] = (cleanRow[1]||'').replace('[아카이브] ', '');
        renderCard(cleanRow, ri >= 0 ? ri : -1);
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  function renderCard(row, realIdx) {
    const title = row[1] || '';
    const cols = config.columns;
    if (!title) return;

    if (title.startsWith('역할:') || title.startsWith('역할 :')) {
      return; // 카테고리 그룹핑에서 이미 처리
    }

    // Determine card color
    let cardClass = '';
    let personCol = -1;
    if (currentTab === '의사결정') { personCol = 5; }
    else if (currentTab === '합의사항') { personCol = 3; }
    else if (currentTab === '아이디어') { personCol = 3; }

    if (personCol >= 0) {
      const person = (row[personCol] || '').trim();
      const pi = getPersonInfo(person);
      if (currentTab === '의사결정') {
        cardClass = pi.card;
      }
    }

    // Build content (skip index 0=카테고리, 1=항목)
    let contentHtml = '';
    for (let i = 2; i < cols.length; i++) {
      const val = row[i] || '';
      if (!val) continue;
      if (cols[i] === '카테고리' || cols[i] === '우선순위') continue;
      if (cols[i] === '프로젝트') {
        const bg = PROJECT_COLORS[val] || '#f0f0f0';
        contentHtml += `<div style="margin-top:6px"><span class="project-badge" style="background:${bg}">${val}</span></div>`;
        continue;
      }
      if (cols[i] === '담당' || cols[i] === '출처') {
        contentHtml += personBadgeHtml(val);
      } else if (cols[i] === '상태') {
        const sc = val === '대기' ? 'status-wait' : val === '진행중' ? 'status-progress' : val === '완료' ? 'status-done' : '';
        contentHtml += `<div style="margin-top:8px"><span class="status-badge ${sc}">${val}</span></div>`;
      } else if (cols[i] === '선택지' && val) {
        const choices = val.split('/').map(c => `<span class="choice">${c.trim()}</span>`).join('');
        contentHtml += `<div class="choices">${choices}</div>`;
      } else if (cols[i] === '비고' && val) {
        contentHtml += `<div class="card-note">${val.replace(/\n/g, '<br>')}</div>`;
      } else {
        contentHtml += `<div class="card-content">${val.replace(/\n/g, '<br>')}</div>`;
      }
    }

    const pri = currentTab === '의사결정' ? (row[2] || '') : '';
    const priHtml = pri
      ? `<span class="priority-tag priority-${pri==='긴급'?'urgent':pri==='중요'?'important':'hold'}">${pri}</span>` : '';

    const archiveTitle = currentTab === '아이디어' ? '폐기 → 아카이브'
      : currentTab === '조사' ? '완료 → 아카이브'
      : currentTab === '의사결정' ? '보류/기각 → 아카이브'
      : currentTab === '합의사항' ? '종결 → 아카이브'
      : '아카이브';
    const actionsHtml = realIdx >= 0 ? `
      <div class="card-actions">
        <button onclick="event.stopPropagation(); archiveCard(${realIdx})" title="${archiveTitle}">&#128230;</button>
        <button onclick="event.stopPropagation(); toggleMoveMenu(event, ${realIdx})" title="이동">&#8644;</button>
        <button onclick="event.stopPropagation(); deleteRow(${realIdx})" title="삭제">&#10005;</button>
      </div>
      <div class="move-menu" id="move-${realIdx}">
        ${SHEET_ORDER.filter(s => s !== currentTab).map(s =>
          `<div onclick="event.stopPropagation(); moveCard(${realIdx}, '${s}')">${s} &rarr;</div>`
        ).join('')}
      </div>` : '';

    html += `
      <div class="card ${cardClass}" ${realIdx >= 0 ? `onclick="openEditModal(${realIdx})"` : ''}>
        ${actionsHtml}
        <div class="card-title">${title}${priHtml}${(() => { const c = changeMap[`${currentTab}-${realIdx}`]; return c === 'new' ? '<span class="badge-new">NEW</span>' : c === 'edited' ? '<span class="badge-edited">수정</span>' : ''; })()}</div>
        ${contentHtml}
      </div>
    `;
  }
}

const PROJECTS = ['펜타스쿨', '펜타캠퍼스', '펜타웍스', '펜타몰', '펜타북스', '펜타랩', '책나무', '공통'];
const PROJECT_COLORS = {
  '펜타스쿨': '#E8F5E9', '펜타캠퍼스': '#E3F2FD', '펜타웍스': '#FFF3E0',
  '펜타몰': '#FCE4EC', '펜타북스': '#F3E5F5', '펜타랩': '#E0F2F1',
  '책나무': '#FFF8E1', '공통': '#ECEFF1'
};

function buildFieldHtml(col, i, val) {
  if (col === '프로젝트') {
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>
      ${PROJECTS.map(p => `<option value="${p}" ${val===p?'selected':''}>${p}</option>`).join('')}</select></div>`;
  }
  if (col === 'Phase') {
    const opts = Object.entries(PHASE_NAMES).map(([k,v]) => `<option value="${k}" ${val===k?'selected':''}>${k}: ${v}</option>`).join('');
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>${opts}</select></div>`;
  }
  if (col === '마일스톤' && currentTab === '할일') {
    const milestones = (allData['로드맵'] || []).slice(2).map(r => r[1]).filter(Boolean);
    const opts = [...new Set(milestones)].map(m => `<option value="${m}" ${val===m?'selected':''}>${m}</option>`).join('');
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>${opts}</select></div>`;
  }
  if (['기한','목표일','완료일'].includes(col)) {
    return `<div class="form-group"><label>${col}</label>
      <input type="date" id="field_${i}" value="${val||''}"></div>`;
  }
  if (col === '카테고리') {
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>
      ${CATEGORIES.map(c => `<option value="${c}" ${val===c?'selected':''}>${c}</option>`).join('')}</select></div>`;
  }
  if (col === '우선순위') {
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>
      <option value="긴급" ${val==='긴급'?'selected':''}>긴급</option>
      <option value="중요" ${val==='중요'?'selected':''}>중요</option>
      <option value="보류" ${val==='보류'?'selected':''}>보류</option></select></div>`;
  }
  if (col === '담당') {
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>
      <option value="공동" ${val==='공동'?'selected':''}>공동</option>
      <option value="이동길" ${val==='이동길'?'selected':''}>이동길</option>
      <option value="이은경" ${val==='이은경'?'selected':''}>이은경</option>
      <option value="?" ${val==='?'?'selected':''}>미정(?)</option></select></div>`;
  }
  if (col === '출처') {
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>
      <option value="이동길" ${val==='이동길'?'selected':''}>이동길</option>
      <option value="이은경" ${val==='이은경'?'selected':''}>이은경</option>
      <option value="대화" ${val==='대화'?'selected':''}>대화</option></select></div>`;
  }
  if (col === '상태') {
    if (currentTab === '로드맵') {
      return `<div class="form-group"><label>${col}</label>
        <select id="field_${i}"><option value="">선택</option>
        <option value="예정" ${val==='예정'?'selected':''}>예정</option>
        <option value="진행중" ${val==='진행중'?'selected':''}>진행중</option>
        <option value="완료" ${val==='완료'?'selected':''}>완료</option>
        <option value="지연" ${val==='지연'?'selected':''}>지연</option></select></div>`;
    }
    return `<div class="form-group"><label>${col}</label>
      <select id="field_${i}"><option value="">선택</option>
      <option value="대기" ${val==='대기'?'selected':''}>대기</option>
      <option value="진행중" ${val==='진행중'?'selected':''}>진행중</option>
      <option value="완료" ${val==='완료'?'selected':''}>완료</option></select></div>`;
  }
  const type = (['비고','내용','결과 요약'].includes(col)) ? 'textarea' : 'input';
  const escaped = type === 'input' ? (val||'').replace(/"/g, '&quot;') : '';
  return `<div class="form-group"><label>${col}</label>
    <${type} id="field_${i}" ${type === 'textarea' ? '' : 'type="text"'} value="${type === 'input' ? escaped : ''}">${type === 'textarea' ? (val||'') : ''}</${type}></div>`;
}

function openEditModal(rowIdx) {

async function gasPost(payload) {
  const url = API + '?payload=' + encodeURIComponent(JSON.stringify(payload));
  await fetch(url);
}

async function saveItem() {
  const config = SHEET_CONFIG[currentTab];
  const values = config.columns.map((_, i) => document.getElementById(`field_${i}`).value);
  try {
    if (editingRow !== null) {
      const endCol = String.fromCharCode(64 + config.columns.length);
      await gasPost({ action: 'update', sheet: currentTab, range: `A${editingRow + 1}:${endCol}${editingRow + 1}`, values });
    } else {
      await gasPost({ action: 'append', sheet: currentTab, values });
    }
    closeModal();
    showToast(editingRow !== null ? '수정 완료' : '추가 완료');
    setTimeout(() => loadData(), 1000);
  } catch (e) { showToast('저장 실패'); }
}

async function deleteRow(rowIdx) {
  if (!confirm('완전히 삭제합니다. 계속할까요?')) return;
  const config = SHEET_CONFIG[currentTab];
  const endCol = String.fromCharCode(64 + config.columns.length);
  try {
    await gasPost({ action: 'clear', sheet: currentTab, range: `A${rowIdx + 1}:${endCol}${rowIdx + 1}` });
    showToast('삭제 완료');
    setTimeout(() => loadData(), 1000);
  } catch (e) { showToast('삭제 실패'); }
}

async function archiveCard(rowIdx) {
  const rows = allData[currentTab] || [];
  const row = rows[rowIdx] || [];
  const config = SHEET_CONFIG[currentTab];
  const prefix = currentTab === '조사' ? '[아카이브:조사] ' : currentTab === '합의사항' ? '[아카이브:합의] ' : '[아카이브] ';
  const values = [...row];
  if (!(values[1]||'').startsWith('[아카이브')) values[1] = prefix + values[1];
  const endCol = String.fromCharCode(64 + config.columns.length);
  try {
    await gasPost({ action: 'update', sheet: currentTab, range: `A${rowIdx + 1}:${endCol}${rowIdx + 1}`, values });
    showToast('아카이브로 이동');
    setTimeout(() => loadData(), 1000);
  } catch (e) { showToast('아카이브 실패'); }
}

function toggleMoveMenu(e, rowIdx) {
  const menu = document.getElementById('move-' + rowIdx);
  document.querySelectorAll('.move-menu.show').forEach(m => { if (m !== menu) m.classList.remove('show'); });
  menu.classList.toggle('show');
}

async function moveCard(rowIdx, targetSheet) {
  const rows = allData[currentTab] || [];
  const row = rows[rowIdx] || [];
  const sourceConfig = SHEET_CONFIG[currentTab];
  const targetConfig = SHEET_CONFIG[targetSheet];
  const values = [];
  for (let i = 0; i < targetConfig.columns.length; i++) values.push(i < row.length ? row[i] : '');
  // 결정 이력 보존: 의사결정→합의사항 이동 시 원본은 아카이브로 남김
  const preserveAsArchive = (currentTab === '의사결정' && targetSheet === '합의사항');
  try {
    await gasPost({ action: 'append', sheet: targetSheet, values });
    const endCol = String.fromCharCode(64 + sourceConfig.columns.length);
    if (preserveAsArchive) {
      const archivedRow = [...row];
      if (!(archivedRow[1]||'').startsWith('[아카이브]')) {
        archivedRow[1] = '[아카이브:결정확정] ' + (archivedRow[1]||'');
      }
      await gasPost({ action: 'update', sheet: currentTab, range: `A${rowIdx + 1}:${endCol}${rowIdx + 1}`, values: archivedRow });
    } else {
      await gasPost({ action: 'clear', sheet: currentTab, range: `A${rowIdx + 1}:${endCol}${rowIdx + 1}` });
    }
    showToast(`${targetSheet}(으)로 이동 완료`);
    setTimeout(() => loadData(), 1500);
  } catch (e) { showToast('이동 실패'); }
}

const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
function formatDateWithDay(dateStr) {
  if (!dateStr) return '';
  const clean = dateStr.replace(/\s.*$/, '').trim(); // 타임존 등 제거
  const match = clean.match(/^(\d{4})-(\d{2})(?:-(\d{2}))?$/);
  if (!match) return clean;
  if (!match[3]) return `${match[1]}-${match[2]}`; // 월까지만 있으면 그대로
  const d = new Date(match[1], parseInt(match[2]) - 1, parseInt(match[3]));
  return `${match[1]}-${match[2]}-${match[3]} (${DAY_NAMES[d.getDay()]})`;
}

// ─── 회의록 렌더링 ───
function renderMeetingPanel(config, rows, allDataRows) {
  let html = `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModal()">+ 추가</button>
    </div>
  `;

  // 회차별 그룹핑
  const meetings = [];
  let current = null;
  allDataRows.forEach((row, idx) => {
    const realIdx = idx + 2;
    if ((row[0] || '').trim()) {
      // row[7] = 원문 링크(회의록 Docs URL)
      current = { num: row[0], date: row[1] || '', attendees: row[2] || '', docLink: row[7] || '', items: [], realIdx };
      meetings.push(current);
    }
    if (current) {
      const agenda = (row[3] || '').trim();
      const isUrl = /^https?:\/\//.test(agenda);
      if (isUrl) {
        // 안건 컬럼에 잘못 들어간 URL → docLink로 처리 (아직 없는 경우에만)
        if (!current.docLink) current.docLink = agenda;
      } else if (agenda) {
        current.items.push({ agenda, discussion: row[4] || '', decision: row[5] || '', action: row[6] || '', realIdx });
      }
    }
  });

  meetings.reverse().forEach((m, mi) => {
    const dateDisplay = formatDateWithDay(m.date.replace(/\s*\(.*\)/, ''));
    const isLatest = mi === 0;
    const docLinkHtml = m.docLink
      ? `<a href="${m.docLink}" target="_blank" onclick="event.stopPropagation()" style="font-size:12px;color:#C9A84C;text-decoration:none;padding:2px 8px;border:1px solid #C9A84C;border-radius:12px;white-space:nowrap">📄 회의록 보기</a>`
      : '';
    html += `<div class="roadmap-group">
      <div class="roadmap-group-header" style="cursor:pointer" onclick="var el=document.getElementById('meeting-${mi}'); var open=el.style.display==='none'; el.style.display=open?'block':'none'; this.querySelector('.toggle-icon').textContent=open?'▼':'▶'">
        <span class="roadmap-group-title"><span class="toggle-icon">${isLatest ? '▼' : '▶'}</span> ${m.num} — ${dateDisplay}</span>
        <span style="display:flex;align-items:center;gap:8px;font-size:12px;color:#656d76">${m.attendees} · ${m.items.length}건 ${docLinkHtml}</span>
      </div>
      <div id="meeting-${mi}" class="${isLatest ? 'show' : ''}" style="display:${isLatest ? 'block' : 'none'}">`;

    m.items.forEach(item => {
      const tag = item.agenda.match(/^\[(.+?)\]/) ? item.agenda.match(/^\[(.+?)\]/)[1] : '';
      const agendaClean = item.agenda.replace(/^\[.+?\]\s*/, '');
      const tagHtml = tag ? `<span class="priority-tag ${tag === '긴급' ? 'priority-urgent' : tag === '중요' ? 'priority-important' : tag === '임박' ? 'priority-urgent' : 'priority-hold'}">${tag}</span> ` : '';

      html += `<div class="roadmap-row" onclick="openEditModal(${item.realIdx})">
        <span class="roadmap-milestone">${tagHtml}${agendaClean}</span>
      </div>`;
      if (item.decision) {
        html += `<div style="padding:4px 20px 12px 36px;font-size:13px;color:#656d76;border-bottom:1px solid #f0f0f0">
          <strong style="color:#1a7f37">결정:</strong> ${item.decision.replace(/\n/g, '<br>')}
        </div>`;
      }
    });

    html += `</div></div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

// ─── 로드맵 렌더링 ───
function renderRoadmapPanel(config, rows, allDataRows) {
  // 프로젝트별 집계 (row[7] = 프로젝트)
  const projectStats = {};
  allDataRows.forEach(r => {
    const proj = (r[7] || '').trim() || '미분류';
    if (!projectStats[proj]) projectStats[proj] = { total: 0, done: 0, inProgress: 0, next: null };
    projectStats[proj].total++;
    const status = (r[3] || '').trim();
    if (status === '완료') projectStats[proj].done++;
    else if (status === '진행중') projectStats[proj].inProgress++;
    if (!projectStats[proj].next && status !== '완료' && r[1]) {
      projectStats[proj].next = { name: r[1], date: r[2] || '' };
    }
  });
  const projectNames = Object.keys(projectStats).sort((a, b) => {
    if (a === '펜타캠퍼스-사이트') return -1;
    if (b === '펜타캠퍼스-사이트') return 1;
    if (a === '미분류') return 1;
    if (b === '미분류') return -1;
    return a.localeCompare(b, 'ko');
  });

  // 필터 적용
  const filteredRows = currentProjectFilter
    ? allDataRows.filter(r => ((r[7] || '').trim() || '미분류') === currentProjectFilter)
    : allDataRows;

  const total = filteredRows.length;
  const done = filteredRows.filter(r => (r[3]||'') === '완료').length;
  const inProgress = filteredRows.filter(r => (r[3]||'') === '진행중').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const filterChip = currentProjectFilter
    ? `<span class="project-filter-chip">${currentProjectFilter} <button onclick="clearProjectFilter()" title="필터 해제">×</button></span>`
    : '';

  let html = `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}${filterChip}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModal()">+ 추가</button>
    </div>
  `;

  // 프로젝트 드릴다운 카드 (필터 없을 때만 표시)
  if (!currentProjectFilter && projectNames.length > 1) {
    html += `<div class="project-section">
      <div class="project-section-title">프로젝트별 보기 · 카드 클릭 시 해당 프로젝트만 필터</div>
      <div class="project-grid">`;
    projectNames.forEach(proj => {
      const s = projectStats[proj];
      const ppct = s.total > 0 ? Math.round((s.done / s.total) * 100) : 0;
      const nextLabel = s.next ? `다음: ${s.next.name}${s.next.date ? ' · ' + s.next.date : ''}` : '모두 완료';
      html += `<div class="project-card" onclick="setProjectFilter('${proj.replace(/'/g, "\\'")}')">
        <div class="project-card-name">${proj}</div>
        <div class="project-card-meta">
          <div class="progress-bar"><div class="progress-fill progress-fill-blue" style="width:${ppct}%"></div></div>
          <span class="progress-text">${s.done}/${s.total}</span>
        </div>
        <div class="project-card-next">${nextLabel}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `
    <div class="progress-summary">
      <span class="progress-summary-label">${currentProjectFilter ? currentProjectFilter + ' 진행률' : '전체 진행률'}</span>
      <div class="progress-bar"><div class="progress-fill progress-fill-green" style="width:${pct}%"></div></div>
      <span class="progress-text">${done}/${total}</span>
      <span style="font-size:12px;color:#656d76">완료 ${done} · 진행중 ${inProgress} · 예정 ${total - done - inProgress}</span>
    </div>
  `;

  // Phase별 그룹핑
  const phases = [...new Set(filteredRows.map(r => (r[0]||'').trim()).filter(Boolean))];
  phases.forEach(phase => {
    const phaseRows = filteredRows.filter(r => (r[0]||'').trim() === phase);
    const phaseDone = phaseRows.filter(r => (r[3]||'') === '완료').length;
    const phasePct = phaseRows.length > 0 ? Math.round((phaseDone / phaseRows.length) * 100) : 0;
    const phaseLabel = PHASE_NAMES[phase] || phase;

    html += `<div class="roadmap-group">
      <div class="roadmap-group-header">
        <span class="roadmap-group-title">${phase}: ${phaseLabel}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-bar"><div class="progress-fill progress-fill-blue" style="width:${phasePct}%"></div></div>
          <span class="progress-text">${phaseDone}/${phaseRows.length}</span>
        </div>
      </div>`;

    phaseRows.forEach(row => {
      const realIdx = rows.indexOf(row);
      const milestone = row[1] || '';
      const date = row[2] || '';
      const status = row[3] || '예정';
      const person = row[4] || '';
      const pi = getPersonInfo(person);
      const sc = status === '예정' ? 'status-scheduled' : status === '진행중' ? 'status-progress' : status === '완료' ? 'status-done' : 'status-delayed';
      const changeBadge = changeMap[`로드맵-${realIdx}`] === 'new' ? '<span class="badge-new">NEW</span>' : changeMap[`로드맵-${realIdx}`] === 'edited' ? '<span class="badge-edited">수정</span>' : '';

      html += `<div class="roadmap-row" onclick="openEditModal(${realIdx})">
        <span class="roadmap-milestone">${milestone}${changeBadge}</span>
        <span class="roadmap-date">${formatDateWithDay(date)}</span>
        <span class="dot ${pi.dot}" style="width:20px;height:20px;font-size:9px">${pi.label}</span>
        <span class="status-badge ${sc}">${status}</span>
      </div>`;
    });

    html += `</div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

// ─── 할일 렌더링 ───
function renderTodoPanel(config, rows, allDataRows) {
  const today = new Date(); today.setHours(0,0,0,0);
  const weekLater = new Date(today); weekLater.setDate(weekLater.getDate() + 7);
  const active = allDataRows.filter(r => (r[4]||'') !== '완료');
  const completed = allDataRows.filter(r => (r[4]||'') === '완료');
  const overdue = active.filter(r => {
    const d = r[3] ? new Date(r[3]) : null;
    return d && d < today;
  });
  const thisWeek = active.filter(r => {
    const d = r[3] ? new Date(r[3]) : null;
    return d && d >= today && d <= weekLater;
  });

  let html = `
    <div class="panel-header">
      <div class="panel-desc">${config.desc}</div>
      <button class="btn btn-primary" style="white-space:nowrap" onclick="openAddModal()">+ 추가</button>
    </div>
    <div class="todo-summary">
      <span><strong>미완료</strong> ${active.length}건</span>
      <span>이번 주 <strong>${thisWeek.length}</strong>건</span>
      ${overdue.length > 0 ? `<span class="cnt-overdue">지연 ${overdue.length}건</span>` : ''}
      <span>완료 ${completed.length}건</span>
    </div>
  `;

  // 마일스톤별 그룹핑 (미완료)
  const milestones = [...new Set(active.map(r => (r[0]||'').trim()).filter(Boolean))];
  milestones.forEach(ms => {
    const msRows = active.filter(r => (r[0]||'').trim() === ms);
    html += `<div class="todo-group">
      <div class="todo-group-header">${ms}</div>`;

    msRows.forEach(row => {
      const realIdx = rows.indexOf(row);
      const title = row[1] || '';
      const person = row[2] || '';
      const due = row[3] || '';
      const status = row[4] || '대기';
      const pi = getPersonInfo(person);
      const dueDate = due ? new Date(due) : null;
      const isOverdue = dueDate && dueDate < today && status !== '완료';
      const isDone = status === '완료';
      const checkClass = isDone ? 'done' : '';
      const checkIcon = isDone ? '✓' : '';
      const changeBadge = changeMap[`할일-${realIdx}`] === 'new' ? '<span class="badge-new">NEW</span>' : changeMap[`할일-${realIdx}`] === 'edited' ? '<span class="badge-edited">수정</span>' : '';

      html += `<div class="todo-row" onclick="openEditModal(${realIdx})">
        <div class="todo-check ${checkClass}" onclick="event.stopPropagation(); toggleTodoStatus(${realIdx})">${checkIcon}</div>
        <span class="todo-title ${isDone ? 'done' : ''}">${title}${changeBadge}</span>
        <span class="dot ${pi.dot}" style="width:18px;height:18px;font-size:8px">${pi.label}</span>
        <span class="todo-due ${isOverdue ? 'overdue' : ''}">${formatDateWithDay(due)}${isOverdue ? ' ⚠' : ''}</span>
      </div>`;
    });

    html += `</div>`;
  });

  // 완료 항목 접기
  if (completed.length > 0) {
    html += `<div class="archive-toggle" onclick="document.getElementById('todo-done-section').classList.toggle('show'); this.querySelector('span').textContent = document.getElementById('todo-done-section').classList.contains('show') ? '▼' : '▶'">
      <span>▶</span> 완료 (${completed.length})
    </div>`;
    html += `<div class="archive-section" id="todo-done-section">`;

    completed.forEach(row => {
      const realIdx = rows.indexOf(row);
      const title = row[1] || '';
      const person = row[2] || '';
      const completedDate = row[5] || '';
      const pi = getPersonInfo(person);

      html += `<div class="todo-row" style="opacity:0.5" onclick="openEditModal(${realIdx})">
        <div class="todo-check done" onclick="event.stopPropagation(); toggleTodoStatus(${realIdx})">✓</div>
        <span class="todo-title done">${title}</span>
        <span class="dot ${pi.dot}" style="width:18px;height:18px;font-size:8px">${pi.label}</span>
        <span class="todo-due">${completedDate || ''}</span>
      </div>`;
    });

    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ─── 할일 상태 토글 ───
async function toggleTodoStatus(rowIdx) {
  const rows = allData['할일'] || [];
  const row = rows[rowIdx] || [];
  const config = SHEET_CONFIG['할일'];
  const values = [...row];
  while (values.length < config.columns.length) values.push('');

  const current = (values[4] || '').trim();
  if (current === '완료') {
    values[4] = '대기';
    values[5] = '';
  } else {
    values[4] = '완료';
    values[5] = new Date().toISOString().slice(0, 10);
  }

  // UI 즉시 반영
  allData['할일'][rowIdx] = values;
  showToast(values[4] === '완료' ? '✓ 완료' : '↩ 복원');
  renderTabs();
  renderPanel();

  // API는 백그라운드로
  const endCol = String.fromCharCode(64 + config.columns.length);
  gasPost({ action: 'update', sheet: '할일', range: `A${rowIdx + 1}:${endCol}${rowIdx + 1}`, values });
}

function openFeedbackModal() {
  document.getElementById('fb_content').value = '';
  document.getElementById('feedbackModal').classList.add('show');
}
function closeFeedbackModal() {
  document.getElementById('feedbackModal').classList.remove('show');
}
async function submitFeedback() {
  const author = document.getElementById('fb_author').value;
  const content = document.getElementById('fb_content').value.trim();
  if (!content) { showToast('내용을 입력해주세요'); return; }
  const today = new Date().toISOString().slice(0, 10);
  await gasPost({ action: 'append', sheet: '개선요청', values: [author, today, content, '접수', ''] });
  closeFeedbackModal();
  showToast('개선 요청 접수 완료');
}
document.getElementById('feedbackModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('feedbackModal')) closeFeedbackModal();
});

function renderNoticePanel() {
  const main = document.querySelector('main');
  const cats = [...new Set(NOTICES.map(n => n.category))];
  let html = `
    <div class="panel-header">
      <div class="panel-desc"><strong>운영 공지 및 가이드.</strong> 자동화 시스템 안내, 회의 운영 방식 등 공동창업자 공유 사항. 카드를 클릭하면 바로 열립니다.</div>
    </div>
  `;
  cats.forEach(cat => {
    const items = NOTICES.filter(n => n.category === cat);
    html += `<div class="section-title">${cat}</div><div class="report-grid">`;
    items.forEach(n => {
      const idx = NOTICES.indexOf(n);
      html += `
        <div class="report-card" onclick="openNotice(${idx})">
          <div class="report-title">${n.title}</div>
          <div class="report-desc">${n.desc}</div>
          <div class="report-meta">
            <span>${n.date}</span>
            <span class="report-cat">${n.category}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  main.innerHTML = html;
}

function openNotice(idx) {
  const n = NOTICES[idx];
  const viewer = document.createElement('div');
  viewer.className = 'report-viewer';
  viewer.id = 'noticeViewer';
  viewer.innerHTML = `
    <div class="report-viewer-bar">
      <span class="rv-title">${n.title}</span>
      <div class="rv-actions">
        <button class="btn-rv" onclick="window.open('${n.file}', '_blank')">새 탭에서 열기</button>
        <button class="btn-rv" onclick="closeNotice()">닫기</button>
      </div>
    </div>
    <iframe src="${n.file}"></iframe>
  `;
  document.body.appendChild(viewer);
}

function closeNotice() {
  const v = document.getElementById('noticeViewer');
  if (v) v.remove();
}

function renderReportPanel() {
  const main = document.querySelector('main');
  const cats = [...new Set(REPORTS.map(r => r.category))];
  let html = `
    <div class="panel-header">
      <div class="panel-desc"><strong>분석 리포트 아카이브.</strong> 조사·분석 결과물을 모아 볼 수 있습니다. 카드를 클릭하면 바로 열립니다.</div>
    </div>
  `;
  cats.forEach(cat => {
    const items = REPORTS.filter(r => r.category === cat);
    html += `<div class="section-title">${cat}</div><div class="report-grid">`;
    items.forEach((r, idx) => {
      const globalIdx = REPORTS.indexOf(r);
      html += `
        <div class="report-card" onclick="openReport(${globalIdx})">
          <div class="report-title">${r.title}</div>
          <div class="report-desc">${r.desc}</div>
          <div class="report-meta">
            <span>${r.date}</span>
            <span class="report-cat">${r.category}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  main.innerHTML = html;
}

function openReport(idx) {
  const r = REPORTS[idx];
  const viewer = document.createElement('div');
  viewer.className = 'report-viewer';
  viewer.id = 'reportViewer';
  viewer.innerHTML = `
    <div class="report-viewer-bar">
      <span class="rv-title">${r.title}</span>
      <div class="rv-actions">
        <button class="btn-rv" onclick="window.open('${r.file}', '_blank')">새 탭에서 열기</button>
        <button class="btn-rv" onclick="closeReport()">닫기</button>
      </div>
    </div>
    <iframe src="${r.file}"></iframe>
  `;
  document.body.appendChild(viewer);
}

function closeReport() {
  const v = document.getElementById('reportViewer');
  if (v) v.remove();
}

loadData();
